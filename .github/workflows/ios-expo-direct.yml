name: iOS Expo Direct Build

# Direct TestFlight build for the Expo-native iOS app.

on:
  push:
    branches:
      - main
    paths:
      - apps/mobile/**
      - fastlane/**
      - .github/workflows/ios-expo-direct.yml
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional iOS build number. Leave empty to use 1000 + GitHub run number.
        required: false
        type: string

concurrency:
  group: ios-expo-direct-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: Build Expo IPA and upload to TestFlight
    # App Store Connect now requires uploads built with the iOS 26 SDK.
    # Keep this on macos-26 / Xcode 26 and patch incompatible pods in Fastlane.
    runs-on: macos-26
    timeout-minutes: 75
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL || vars.EXPO_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY || vars.EXPO_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL || vars.EXPO_PUBLIC_API_BASE_URL || 'https://www.synapfit.app' }}
      # RevenueCat iOS public SDK key (appl_…). Inlined at build time so the
      # paywall can load App Store products. Without it the paywall shows
      # "store unavailable", so it must be set before the review build.
      EXPO_PUBLIC_REVENUECAT_IOS_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_IOS_KEY || vars.EXPO_PUBLIC_REVENUECAT_IOS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci --legacy-peer-deps

      - name: Validate mobile public runtime env
        run: |
          missing=0
          for name in EXPO_PUBLIC_SUPABASE_URL EXPO_PUBLIC_SUPABASE_ANON_KEY EXPO_PUBLIC_API_BASE_URL; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing mobile runtime env::$name is required for the TestFlight app. Add it as a GitHub Actions secret or repository variable."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Mobile runtime env is present. Supabase URL host: $(node -e "console.log(new URL(process.env.EXPO_PUBLIC_SUPABASE_URL).host)")"

      - name: Typecheck mobile app
        run: npm run mobile:typecheck

      - name: Validate Expo config
        run: npm run mobile:config

      - name: Validate Expo SDK dependency alignment
        working-directory: apps/mobile
        run: npx expo-doctor

      - name: Show active Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Write App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > "$RUNNER_TEMP/asc/AuthKey.p8"
          if grep -q '\\n' "$RUNNER_TEMP/asc/AuthKey.p8"; then
            perl -0pi -e 's/\\n/\n/g' "$RUNNER_TEMP/asc/AuthKey.p8"
          fi
          chmod 600 "$RUNNER_TEMP/asc/AuthKey.p8"
          echo "ASC_P8_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Fastlane Expo beta
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_P8_KEY_PATH: ${{ env.ASC_P8_KEY_PATH }}
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          # App Store provisioning profile for the Live Activity widget extension
          # (app.synap.fit.SynapWidget). Without this in the env, Fastlane's
          # step 8b skips widget signing and the archive falls back to the main
          # app profile (wrong bundle id) → App Store upload errors 90347/90685.
          IOS_WIDGET_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISION_PROFILE_BASE64 }}
          IOS_BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -o pipefail
          bundle exec fastlane ios expo_beta 2>&1 | tee fastlane-expo.log

      - name: Expose Fastlane failure
        if: failure()
        run: |
          if [ -f fastlane-expo.log ]; then
            perl -pe 's/\e\[[0-9;]*m//g' fastlane-expo.log > fastlane-expo.clean.log
            grep -Ein "error|exception|fatal|invalid|missing|could not|certificate|keychain|profile|api key|\\[!\\]|undefined|wrong number|no such|unauthorized|forbidden|expired|permission|team" fastlane-expo.clean.log > fastlane-expo.error-lines.log || true
            tail -80 fastlane-expo.clean.log > fastlane-expo.failure-lines.log
            {
              echo "## Fastlane Expo failure"
              echo ""
              echo "### Matched error lines"
              echo ""
              echo '```text'
              if [ -s fastlane-expo.error-lines.log ]; then
                head -80 fastlane-expo.error-lines.log
              else
                echo "No matched error lines found."
              fi
              echo '```'
              echo ""
              echo "### Last 80 lines"
              echo ""
              echo '```text'
              cat fastlane-expo.failure-lines.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r LINE; do
              SAFE=$(printf '%s' "$LINE" | sed 's/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
              echo "::error title=Fastlane detail::$SAFE"
            done < fastlane-expo.failure-lines.log
            if [ -s fastlane-expo.error-lines.log ]; then
              head -40 fastlane-expo.error-lines.log | while IFS= read -r LINE; do
                SAFE=$(printf '%s' "$LINE" | sed 's/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
                echo "::error title=Fastlane matched error::$SAFE"
              done
            fi
          else
            echo "::error title=Fastlane Expo beta failed::fastlane-expo.log was not created."
          fi

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synap-expo-ios-${{ github.run_number }}.ipa
          path: build/SYNAP-Expo.ipa
          retention-days: 14

      - name: Upload dSYM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synap-expo-ios-${{ github.run_number }}.dSYM
          path: build/SYNAP-Expo.app.dSYM.zip
          retention-days: 14

      - name: Upload Fastlane log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-expo-log-${{ github.run_number }}
          path: |
            fastlane-expo.log
            fastlane-expo.clean.log
            fastlane-expo.error-lines.log
            fastlane-expo.failure-lines.log
          retention-days: 7

      - name: Print Xcode build log
        if: failure()
        run: |
          LOG=$(ls -t ~/Library/Logs/gym/*.log 2>/dev/null | head -1 || true)
          if [ -n "$LOG" ]; then
            tail -300 "$LOG"
          else
            echo "No gym log found."
          fi

      - name: Upload Xcode gym log artifact
        if: always()
        run: |
          mkdir -p build/gym-logs
          cp ~/Library/Logs/gym/*.log build/gym-logs/ 2>/dev/null || true

      - name: Upload Xcode gym logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-gym-logs-${{ github.run_number }}
          path: build/gym-logs
          retention-days: 7
