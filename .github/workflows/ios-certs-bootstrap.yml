name: iOS Bootstrap Certs

on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Create certs in synap-certs
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
          bundler-cache: true

      - run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Write ASC API key
        run: |
          mkdir -p $RUNNER_TEMP/asc
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > $RUNNER_TEMP/asc/AuthKey.p8
          echo "ASC_P8_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> $GITHUB_ENV

      - name: Create keychain
        run: |
          security create-keychain -p "${{ secrets.MATCH_KEYCHAIN_PASSWORD }}" fastlane_match.keychain
          security set-keychain-settings -lut 3600 fastlane_match.keychain
          security unlock-keychain -p "${{ secrets.MATCH_KEYCHAIN_PASSWORD }}" fastlane_match.keychain
          security list-keychains -d user -s fastlane_match.keychain $(security list-keychains -d user | sed s/\"//g)

      - name: Create certs via Fastlane match
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_P8_KEY_PATH: ${{ env.ASC_P8_KEY_PATH }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios certs_create
