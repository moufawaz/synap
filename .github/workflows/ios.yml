# ─────────────────────────────────────────────────────────────────────────────
# SYNAP — iOS CI/CD  (no Mac required — everything runs on the CI runner)
# ─────────────────────────────────────────────────────────────────────────────
# The ios/ folder is NOT committed to the repo.
# This workflow generates it fresh on every run using npx cap add ios,
# applies all required configuration (Info.plist, entitlements, Xcode settings),
# then signs and uploads to TestFlight — all on a GitHub-hosted macOS runner.
#
# Triggers:
#   • Push to main → build IPA + upload to TestFlight
#   • Manual dispatch → same
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   APPLE_ID                          your@appleid.com
#   APPLE_TEAM_ID                     82KX629P83
#   ITC_TEAM_ID                       numeric App Store Connect team ID
#   APP_STORE_CONNECT_API_KEY_ID      key ID  (e.g. ABCD1234EF)
#   APP_STORE_CONNECT_ISSUER_ID       issuer ID (UUID)
#   APP_STORE_CONNECT_API_KEY_P8      full contents of the .p8 file
#   MATCH_GIT_URL                     https://github.com/moufawaz/synap-certs
#   MATCH_GIT_TOKEN                   base64(username:personal_access_token)
#   MATCH_PASSWORD                    encryption password for the certs repo
#   MATCH_KEYCHAIN_PASSWORD           any random string (temp CI keychain)
#
# Optional:
#   SLACK_WEBHOOK_URL                 build notifications
# ─────────────────────────────────────────────────────────────────────────────

name: iOS — Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'android/**'
      - 'store-metadata.md'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build IPA → TestFlight
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Node / npm ────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # ── Generate iOS project on the CI runner ─────────────────────────────────
      # The ios/ folder is not committed — we generate it fresh every run.
      - name: Generate iOS project (npx cap add ios)
        run: npx cap add ios

      - name: Sync Capacitor config and assets into iOS project
        run: npx cap sync ios

      # ── Generate app icon + splash for iOS ───────────────────────────────────
      # Reads resources/icon.png and resources/splash.png and writes all
      # required icon sizes into ios/App/App/Assets.xcassets/
      - name: Generate iOS app icon and splash screen
        run: npx @capacitor/assets generate --ios

      # ── Apply iOS configuration ───────────────────────────────────────────────
      # Patches plugin Package.swift files for NonescapableTypes,
      # adds Info.plist permission strings, Associated Domains entitlement,
      # Push Notifications entitlement, and wires entitlements into Xcode.
      - name: Configure iOS project (plist + entitlements + Xcode settings)
        run: node scripts/setup-ios.mjs

      # ── Verify Package.swift patches ─────────────────────────────────────────
      # Print the patched section of each plugin Package.swift so we can confirm
      # the NonescapableTypes flag was inserted correctly in the CI log.
      - name: Verify NonescapableTypes patches
        run: |
          for pkg in \
            node_modules/@capacitor/status-bar/Package.swift \
            node_modules/@capacitor/splash-screen/Package.swift \
            node_modules/@capacitor/push-notifications/Package.swift; do
            echo "=== $pkg ==="
            grep -A2 "swiftSettings\|NonescapableTypes\|ios/Sources" "$pkg" || echo "(pattern not found)"
          done

      # ── Diagnostic: iOS project structure ────────────────────────────────────
      # Print the files written by setup-ios.mjs so we can confirm the HealthKit
      # bridge and ViewController.swift were created and are non-empty.
      - name: Diagnose iOS project files
        run: |
          echo "=== ios/App/App/ contents ==="
          ls -la ios/App/App/ || echo "(directory not found)"
          echo ""
          echo "=== ViewController.swift ==="
          cat ios/App/App/ViewController.swift 2>/dev/null || echo "(file not found)"
          echo ""
          echo "=== SynapHealthKitPlugin.swift (first 20 lines) ==="
          head -20 ios/App/App/SynapHealthKitPlugin.swift 2>/dev/null || echo "(file not found)"
          echo ""
          echo "=== SynapHealthKitPlugin.m ==="
          cat ios/App/App/SynapHealthKitPlugin.m 2>/dev/null || echo "(file not found)"
          echo ""
          echo "=== Main.storyboard viewController line ==="
          grep -n "viewController\|customClass\|customModule" \
            ios/App/App/Base.lproj/Main.storyboard 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== pbxproj SynapHealthKit entries ==="
          grep -n "SynapHealthKit\|ViewController\|instancePlugins\|HealthKit.framework" \
            ios/App/App.xcodeproj/project.pbxproj 2>/dev/null | head -40 || echo "(not found)"

      # ── Confirm Xcode version ─────────────────────────────────────────────────
      # macos-26 default Xcode (Xcode.app) ships with Xcode 26 and the iOS 26 SDK
      # (required by App Store Connect as of 2026).  Do NOT override xcode-select —
      # pointing to a secondary Xcode installation may lack the iOS platform files.
      - name: Show active Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path 2>/dev/null && echo "iOS SDK: OK" || echo "iOS SDK: NOT FOUND"

      # ── Resolve SPM packages ──────────────────────────────────────────────────
      # Verify scheme exists, then resolve.  Print project info so CI logs
      # immediately show if the project or scheme is missing/broken.
      - name: Resolve Swift Package Manager dependencies
        run: |
          echo "=== Xcode project info ==="
          xcodebuild -list -project ios/App/App.xcodeproj
          echo "=== Resolving packages ==="
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      # ── Ruby / Fastlane ───────────────────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # ── App Store Connect API key ─────────────────────────────────────────────
      - name: Write App Store Connect API key
        run: |
          mkdir -p $RUNNER_TEMP/asc
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}" > $RUNNER_TEMP/asc/AuthKey.p8
          echo "ASC_P8_KEY_PATH=$RUNNER_TEMP/asc/AuthKey.p8" >> $GITHUB_ENV

      # ── Build + Upload ────────────────────────────────────────────────────────
      - name: Fastlane — ios beta
        env:
          APPLE_ID:                        ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:                   ${{ secrets.APPLE_TEAM_ID }}
          ITC_TEAM_ID:                     ${{ secrets.ITC_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_ID:    ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:     ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_P8_KEY_PATH:  ${{ env.ASC_P8_KEY_PATH }}
          MATCH_GIT_URL:                   ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_TOKEN:                 ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD:                  ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD:         ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          SLACK_WEBHOOK_URL:               ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_NUMBER:               ${{ github.run_number }}
        run: bundle exec fastlane ios beta

      # ── Upload build artifacts (always, including on failure) ─────────────────
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synap-ios-${{ github.run_number }}.ipa
          path: build/SYNAP.ipa
          retention-days: 14

      # ── Print Xcode build log inline on failure ───────────────────────────────
      # Prints the last 300 lines of the gym/xcodebuild log directly into the
      # CI output so the actual Swift/signing error is visible without downloading
      # an artifact.  Also uploads the full log as a downloadable artifact.
      - name: Print Xcode build log (last 300 lines)
        if: failure()
        run: |
          LOG=~/Library/Logs/gym/App-App.log
          if [ -f "$LOG" ]; then
            echo "============================================================"
            echo " XCODE BUILD LOG — last 300 lines"
            echo "============================================================"
            tail -300 "$LOG"
          else
            echo "Gym log not found at $LOG"
            echo "Checking alternative locations:"
            ls ~/Library/Logs/gym/ 2>/dev/null || echo "(no gym logs directory)"
          fi

      - name: Upload full Xcode build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-log-${{ github.run_number }}
          path: ~/Library/Logs/gym/App-App.log
          retention-days: 7
